name: petcompanion
description: Platform adopsi hewan peliharaan - adopt & open adopt.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.9
  flutter_local_notifications: ^17.2.4

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1

  # State & Navigation
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1

  # Utils
  intl: ^0.19.0
  image_picker: ^1.0.7
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  permission_handler: ^11.2.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
